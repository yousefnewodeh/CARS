<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NIGHT HIGHWAY</title>
<style>
  :root{
    --bg:#05070d;
    --road:#14161f;
    --line:#e8e2d0;
    --accent:#ff5b3d;
    --accent2:#3dd6ff;
    --text:#e8e2d0;
    --dim:#5c6070;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;height:100%;background:var(--bg);
    font-family:'Courier New',monospace;
    color:var(--text);
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  #wrap{
    position:relative;
    width:480px;
    max-width:100vw;
  }
  #hud{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:0 4px 10px 4px;
    letter-spacing:2px;
  }
  #hud .label{font-size:11px;color:var(--dim);text-transform:uppercase;}
  #hud .val{font-size:22px;color:var(--accent2);font-weight:bold;}
  #hud .val.speed{color:var(--accent);}
  canvas{
    display:block;
    width:100%;
    background:var(--road);
    border:2px solid #23273a;
    border-radius:4px;
    box-shadow:0 0 40px rgba(61,214,255,0.08), inset 0 0 60px rgba(0,0,0,0.6);
  }
  #overlay{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
    background:rgba(5,7,13,0.86);
    border-radius:4px;
    padding:20px;
  }
  #overlay.hidden{display:none;}
  #overlay h1{
    font-size:34px;letter-spacing:4px;margin:0 0 6px 0;
    color:var(--accent);
    text-shadow:0 0 18px rgba(255,91,61,0.5);
  }
  #overlay .sub{color:var(--dim);font-size:12px;letter-spacing:2px;margin-bottom:22px;text-transform:uppercase;}
  #overlay .score-line{font-size:15px;color:var(--accent2);margin-bottom:4px;}
  #overlay .best{font-size:12px;color:var(--dim);margin-bottom:22px;}
  button{
    font-family:inherit;
    background:transparent;
    border:1px solid var(--accent2);
    color:var(--accent2);
    padding:10px 26px;
    font-size:13px;
    letter-spacing:3px;
    cursor:pointer;
    text-transform:uppercase;
    transition:all .15s ease;
  }
  button:hover{background:var(--accent2);color:var(--bg);}
  #controls{
    margin-top:12px;font-size:10px;color:var(--dim);letter-spacing:1px;text-align:center;
  }
  #controls kbd{
    border:1px solid var(--dim);border-radius:3px;padding:1px 6px;color:var(--text);
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div><span class="label">Score </span><span class="val" id="scoreVal">0</span></div>
    <div><span class="label">Speed </span><span class="val speed" id="speedVal">0</span></div>
    <div><span class="label">Best </span><span class="val" id="bestVal">0</span></div>
  </div>
  <canvas id="game" width="480" height="640"></canvas>
  <div id="overlay">
    <h1>NIGHT HIGHWAY</h1>
    <div class="sub">an endless dodge</div>
    <button id="startBtn">Start Engine</button>
    <div id="controls">
      <kbd>&larr;</kbd> <kbd>&rarr;</kbd> or <kbd>A</kbd> <kbd>D</kbd> to steer &nbsp;&middot;&nbsp; hold to change lanes fast
    </div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const scoreVal = document.getElementById('scoreVal');
  const speedVal = document.getElementById('speedVal');
  const bestVal = document.getElementById('bestVal');

  const LANES = 3;
  const laneW = W / LANES;
  const roadMarginColor = '#0c0e16';

  let best = 0;
  try { best = parseInt(localStorage.getItem('nh_best')||'0',10) || 0; } catch(e){ best = 0; }
  bestVal.textContent = best;

  let state = 'idle'; // idle, running, over
  let player, traffic, score, speed, dist, spawnTimer, roadStripes, particles;

  function resetGame(){
    player = { lane: 1, x: laneW*1 + laneW/2, y: H-110, w: 40, h: 68, targetLane: 1, vx: 0, flash:0 };
    traffic = [];
    particles = [];
    score = 0;
    speed = 4.2;
    dist = 0;
    spawnTimer = 0;
    roadStripes = [];
    for(let i=0;i<8;i++) roadStripes.push(i * (H/6) - H/6);
  }

  function laneX(lane){ return lane*laneW + laneW/2; }

  // ---- Input ----
  const keys = {};
  window.addEventListener('keydown', e=>{
    if(['ArrowLeft','ArrowRight','a','d','A','D'].includes(e.key)) e.preventDefault();
    keys[e.key] = true;
    if(state==='running'){
      if((e.key==='ArrowLeft'||e.key==='a'||e.key==='A') && !e.repeat){
        player.targetLane = Math.max(0, player.targetLane-1);
      }
      if((e.key==='ArrowRight'||e.key==='d'||e.key==='D') && !e.repeat){
        player.targetLane = Math.min(LANES-1, player.targetLane+1);
      }
    }
    if(e.key===' ' && (state==='idle'||state==='over')){
      begin();
    }
  });
  window.addEventListener('keyup', e=>{ keys[e.key]=false; });

  // touch controls: tap left/right half of canvas
  canvas.addEventListener('pointerdown', e=>{
    if(state!=='running') return;
    const rect = canvas.getBoundingClientRect();
    const relX = (e.clientX - rect.left) / rect.width;
    if(relX < 0.5) player.targetLane = Math.max(0, player.targetLane-1);
    else player.targetLane = Math.min(LANES-1, player.targetLane+1);
  });

  startBtn.addEventListener('click', begin);

  function begin(){
    resetGame();
    state = 'running';
    overlay.classList.add('hidden');
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }

  function gameOver(){
    state = 'over';
    if(score > best){
      best = score;
      try{ localStorage.setItem('nh_best', String(best)); }catch(e){}
    }
    bestVal.textContent = best;
    document.getElementById('overlay').innerHTML = `
      <h1>WRECKED</h1>
      <div class="sub">the highway wins this round</div>
      <div class="score-line">Score: ${score}</div>
      <div class="best">Best: ${best}</div>
      <button id="startBtn2">Try Again</button>
      <div id="controls"><kbd>&larr;</kbd> <kbd>&rarr;</kbd> or <kbd>A</kbd> <kbd>D</kbd> to steer &nbsp;&middot;&nbsp; <kbd>space</kbd> to restart</div>
    `;
    overlay.classList.remove('hidden');
    document.getElementById('startBtn2').addEventListener('click', begin);
  }

  // ---- Entities ----
  const carColors = ['#3dd6ff','#ffd23d','#a5ff3d','#c93dff','#ff8a3d'];

  function spawnTraffic(){
    const lane = Math.floor(Math.random()*LANES);
    // avoid stacking two cars in same lane too close
    const tooClose = traffic.some(t => t.lane===lane && t.y < 140);
    if(tooClose) return;
    traffic.push({
      lane: lane,
      x: laneX(lane),
      y: -100,
      w: 40, h: 68,
      color: carColors[Math.floor(Math.random()*carColors.length)]
    });
  }

  function drawCar(x,y,w,h,color,glow){
    ctx.save();
    ctx.translate(x,y);
    if(glow){
      ctx.shadowColor = color;
      ctx.shadowBlur = 18;
    }
    // body
    ctx.fillStyle = color;
    roundRect(-w/2,-h/2,w,h,10);
    ctx.fill();
    // windshield
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(5,7,13,0.55)';
    roundRect(-w/2+6,-h/2+10,w-12,18,4);
    ctx.fill();
    roundRect(-w/2+6,h/2-26,w-12,14,4);
    ctx.fill();
    // headlight/taillight accents
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(-w/2+4,-h/2+2,7,4);
    ctx.fillRect(w/2-11,-h/2+2,7,4);
    ctx.restore();
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function spawnParticles(x,y,color){
    for(let i=0;i<14;i++){
      particles.push({
        x, y,
        vx:(Math.random()-0.5)*6,
        vy:(Math.random()-0.5)*6,
        life:30,
        color
      });
    }
  }

  // ---- Loop ----
  let lastTime = 0;
  function loop(now){
    if(state!=='running') return;
    const dt = Math.min(2, (now-lastTime)/16.67);
    lastTime = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  function update(dt){
    dist += speed*dt;
    speed = Math.min(13, 4.2 + dist*0.0018);
    score = Math.floor(dist/8);
    scoreVal.textContent = score;
    speedVal.textContent = Math.round(speed*18);

    // steer smoothly toward target lane
    const tx = laneX(player.targetLane);
    player.x += (tx - player.x) * 0.22 * dt;
    if(player.flash>0) player.flash -= dt;

    // road stripes
    for(let s of roadStripes){}
    roadStripes = roadStripes.map(y => {
      let ny = y + speed*dt*2.2;
      if(ny > H) ny -= H + H/3;
      return ny;
    });

    // spawn traffic
    spawnTimer -= dt;
    if(spawnTimer<=0){
      spawnTraffic();
      spawnTimer = Math.max(22, 46 - speed*2) * (0.6+Math.random()*0.8);
    }

    // move traffic
    for(let t of traffic){
      t.y += speed*dt*2.2;
    }
    traffic = traffic.filter(t => t.y < H+100);

    // collision
    for(let t of traffic){
      if(Math.abs(t.x - player.x) < (t.w+player.w)/2 - 8 &&
         Math.abs(t.y - player.y) < (t.h+player.h)/2 - 6){
        spawnParticles(player.x, player.y, '#ff5b3d');
        gameOver();
        return;
      }
    }

    // particles
    for(let p of particles){
      p.x += p.vx*dt; p.y += p.vy*dt; p.life -= dt;
    }
    particles = particles.filter(p=>p.life>0);
  }

  function render(){
    ctx.clearRect(0,0,W,H);

    // road background gradient
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#0a0c15');
    g.addColorStop(1,'#181c2b');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    // margins
    ctx.fillStyle = roadMarginColor;
    ctx.fillRect(0,0,10,H);
    ctx.fillRect(W-10,0,10,H);

    // lane lines
    ctx.strokeStyle = 'rgba(232,226,208,0.35)';
    ctx.lineWidth = 3;
    ctx.setLineDash([28,26]);
    for(let l=1;l<LANES;l++){
      ctx.beginPath();
      ctx.moveTo(l*laneW,0);
      ctx.lineTo(l*laneW,H);
      ctx.stroke();
    }
    ctx.setLineDash([]);

    // speed stripes on shoulders
    ctx.fillStyle = 'rgba(255,91,61,0.5)';
    for(let y of roadStripes){
      ctx.fillRect(2,y,6,H/8);
      ctx.fillRect(W-8,y,6,H/8);
    }

    // traffic
    for(let t of traffic){
      drawCar(t.x, t.y, t.w, t.h, t.color, false);
    }

    // player
    drawCar(player.x, player.y, player.w, player.h, '#ff5b3d', true);

    // particles
    for(let p of particles){
      ctx.globalAlpha = Math.max(0,p.life/30);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,3,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // vignette
    const vg = ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.75);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,'rgba(0,0,0,0.45)');
    ctx.fillStyle = vg;
    ctx.fillRect(0,0,W,H);
  }

  // idle preview render
  resetGame();
  render();
})();
</script>
</body>
</html>
